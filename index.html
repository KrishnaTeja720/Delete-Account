<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Account - Crickzo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #ffffff;
    padding: 35px;
    border-radius: 14px;
    width: 380px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

h1 {
    font-size: 22px;
    color: #2563eb;
    margin-bottom: 10px;
}

p {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
}

input:focus, textarea:focus {
    border-color: #2563eb;
}

button {
    width: 100%;
    padding: 12px;
    background: #ef4444;
    border: none;
    color: white;
    font-size: 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #dc2626;
}
</style>

</head>

<body>

<div class="container">

<h1>Delete Your Crickzo Account</h1>

<p>
We’re sorry to see you go. Submit this form to request permanent deletion 
of your Crickzo account and associated match data.
</p>

<form>

<input type="text" placeholder="Enter your full name" required>

<input type="email" placeholder="Enter your registered email" required>

<input type="text" placeholder="Registered phone number">

<textarea placeholder="Reason for leaving (optional)"></textarea>

<button type="submit">Delete My Account</button>

</form>

</div>

</body>
</html>
